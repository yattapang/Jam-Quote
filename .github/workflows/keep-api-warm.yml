name: Keep API warm

# Render's free tier spins the API down after ~15 min of inactivity, which
# causes a ~40s cold start (and a "showing demo data" banner) on the next
# request. This workflow pings the health endpoint on a schedule to keep the
# instance awake during the prototype phase.
#
# Best-effort by design: GitHub's scheduled runs can be delayed under load,
# and scheduled workflows are auto-disabled after 60 days with no repo
# activity. For guaranteed always-on, upgrade the Render instance (paid tier,
# no spin-down) or point an external uptime pinger (e.g. UptimeRobot) at
# /api/health.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (Render sleeps after ~15)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          # -m 90 tolerates a cold start; || true so a slow/failed wake-up
          # doesn't mark the workflow failed (which would email on every miss).
          curl -sS -m 90 -o /dev/null \
            -w "health: HTTP %{http_code} in %{time_total}s\n" \
            https://jamquote-api.onrender.com/api/health || true

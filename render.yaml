# Render Blueprint for the JamQuote API.
# https://render.com/docs/blueprint-spec
#
# Usage: in the Render dashboard, "New +" -> "Blueprint", point it at this
# repo. Render reads this file and provisions the service below. DATABASE_URL
# is sync:false (set it manually in the dashboard from your Neon connection
# string) -- never commit a real connection string.
services:
  - type: web
    name: jamquote-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci --include=dev && npm run -w @jamquote/api prisma:generate && npx turbo run build --filter=@jamquote/api
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      # REQUIRED: the API refuses to boot in production without this (auth.module
      # resolveJwtSecret). Set a long random value in the Render dashboard before
      # the first deploy that includes auth, or the service will crash on start.
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
